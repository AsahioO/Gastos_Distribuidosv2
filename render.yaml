services:
  # Django Backend API
  - type: web
    name: gastos-distribuidos-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: gastos-db
          property: connectionString
      - key: POSTGRES_DB
        fromDatabase:
          name: gastos-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: gastos-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: gastos-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: gastos-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gastos-db
          property: port
      - key: CELERY_BROKER_URL
        fromService:
          name: gastos-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: gastos-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Celery Worker
  - type: worker
    name: gastos-celery-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements/production.txt
    startCommand: celery -A config worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          name: gastos-distribuidos-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: gastos-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: gastos-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: gastos-redis
          type: redis
          property: connectionString

  # Redis
  - type: redis
    name: gastos-redis
    plan: free
    maxmemoryPolicy: noeviction
